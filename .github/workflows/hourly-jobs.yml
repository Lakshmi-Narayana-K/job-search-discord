name: Job Digest

on:
  schedule:
    # Daily at 7:00 PM IST (13:30 UTC). GitHub Actions cron is UTC.
    - cron: "30 13 * * *"
  workflow_dispatch:

jobs:
  post-jobs:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: posted_jobs.json
          key: posted-jobs-v1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Post new jobs to Discord
        env:
          TOKEN: ${{ secrets.TOKEN }}
          JOBS_CHANNEL_ID: ${{ secrets.JOBS_CHANNEL_ID }}
          SEARCH_TERMS: ${{ vars.SEARCH_TERMS }}
          SEARCH_LOCATIONS: ${{ vars.SEARCH_LOCATIONS }}
          TITLE_KEYWORDS: ${{ vars.TITLE_KEYWORDS }}
          JOB_SITES: ${{ vars.JOB_SITES }}
          COUNTRY_INDEED: ${{ vars.COUNTRY_INDEED }}
          SCRAPE_LINKEDIN_POSTS: ${{ vars.SCRAPE_LINKEDIN_POSTS }}
          LINKEDIN_POSTS_MAX: ${{ vars.LINKEDIN_POSTS_MAX }}
          RESULTS_WANTED: ${{ vars.RESULTS_WANTED }}
          HOURS_OLD: ${{ vars.HOURS_OLD }}
        run: python post_jobs.py
